<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 516" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Family tree of Yixing clay: the armour clay jiani fathers the purple and green clays (zini, luni, duanni) plus everyday body clay, while the tender clay nenni fathers the red clays (hongni, zhuni, shihuang).">
  <rect x="0" y="0" width="840" height="516" fill="#fbfaf7" stroke="#e7e2d8" stroke-width="1" rx="14"/>

  <text x="420" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#2b2620">The Family Tree of Yixing Clay</text>
  <text x="420" y="66" text-anchor="middle" font-size="14.5" fill="#6f6a60">Every &#8220;famous&#8221; clay is a child of one of two ores nobody names.</text>

  <!-- ROOTS -->
  <g>
    <rect x="40" y="92" width="380" height="62" rx="10" fill="#ece4d9" stroke="#cbbca4" stroke-width="1.5"/>
    <text x="230" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#4a3f33">JIANI &#30002;&#27877;</text>
    <text x="230" y="141" text-anchor="middle" font-size="13" fill="#6b6052">armour clay &#183; the siltstone host rock</text>
  </g>
  <g>
    <rect x="440" y="92" width="380" height="62" rx="10" fill="#f4e7d7" stroke="#e0c098" stroke-width="1.5"/>
    <text x="630" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#7a3f23">NENNI &#23273;&#27877;</text>
    <text x="630" y="141" text-anchor="middle" font-size="13" fill="#7d5b3f">tender clay &#183; the soft mudstone</text>
  </g>

  <!-- CONNECTORS -->
  <g stroke="#bdb3a1" stroke-width="1.5" fill="none">
    <path d="M230 154 L230 168 L56 168 L56 437"/>
    <path d="M56 211 L70 211"/><path d="M56 285 L70 285"/><path d="M56 359 L70 359"/><path d="M56 433 L70 433"/>
    <path d="M630 154 L630 168 L456 168 L456 437"/>
    <path d="M456 211 L470 211"/><path d="M456 285 L470 285"/><path d="M456 359 L470 359"/><path d="M456 433 L470 433"/>
  </g>

  <!-- LEFT CHILDREN (jiani lineage) -->
  <g>
    <rect x="70" y="182" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="98" cy="211" r="9" fill="#6b4a3a"/>
    <text x="120" y="207" font-size="14.5" font-weight="700" fill="#2b2620">Zini &#32043;&#27877; &#183; purple clay</text>
    <text x="120" y="226" font-size="12.5" fill="#6f6a60">a thin seam <tspan font-style="italic">within</tspan> the jiani</text>
  </g>
  <g>
    <rect x="70" y="256" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="98" cy="285" r="9" fill="#8d9261"/>
    <text x="120" y="281" font-size="14.5" font-weight="700" fill="#2b2620">L&#252;ni &#32511;&#27877; &#183; green clay</text>
    <text x="120" y="300" font-size="12.5" fill="#6f6a60">a lens within the zini &#8594; &#27877;&#20013;&#27877;</text>
  </g>
  <g>
    <rect x="70" y="330" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="98" cy="359" r="9" fill="#c2a05f"/>
    <text x="120" y="355" font-size="14.5" font-weight="700" fill="#2b2620">Duanni &#27573;&#27877; &#183; buff clay</text>
    <text x="120" y="374" font-size="12.5" fill="#6f6a60">a zini&#8211;l&#252;ni blend *</text>
  </g>
  <g>
    <rect x="70" y="404" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="98" cy="433" r="9" fill="#7d6f5f"/>
    <text x="120" y="429" font-size="14.5" font-weight="700" fill="#2b2620">Jiani body clay</text>
    <text x="120" y="448" font-size="12.5" fill="#6f6a60">everyday jars, vases, kiln ware</text>
  </g>

  <!-- RIGHT CHILDREN (nenni lineage) -->
  <g>
    <rect x="470" y="182" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="498" cy="211" r="9" fill="#b5482e"/>
    <text x="520" y="207" font-size="14.5" font-weight="700" fill="#2b2620">Hongni &#32418;&#27877; &#183; red clay</text>
    <text x="520" y="226" font-size="12.5" fill="#6f6a60">at the base of the nenni layer</text>
  </g>
  <g>
    <rect x="470" y="256" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="498" cy="285" r="9" fill="#9e3622"/>
    <text x="520" y="281" font-size="14.5" font-weight="700" fill="#2b2620">Zhuni &#26417;&#27877; &#183; cinnabar red</text>
    <text x="520" y="300" font-size="12.5" fill="#6f6a60">iron-rich (~14&#8211;18% Fe oxide)</text>
  </g>
  <g>
    <rect x="470" y="330" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="498" cy="359" r="9" fill="#d4a23c"/>
    <text x="520" y="355" font-size="14.5" font-weight="700" fill="#2b2620">Shihuang &#30707;&#40644; &#183; stone-yellow</text>
    <text x="520" y="374" font-size="12.5" fill="#6f6a60">iron concretions in the nenni</text>
  </g>
  <g>
    <rect x="470" y="404" width="320" height="58" rx="9" fill="#ffffff" stroke="#e3ded3"/>
    <circle cx="498" cy="433" r="9" fill="#d3ad77"/>
    <text x="520" y="429" font-size="14.5" font-weight="700" fill="#2b2620">Nenni &#23273;&#27877; &#183; tender clay</text>
    <text x="520" y="448" font-size="12.5" fill="#6f6a60">plasticiser &amp; everyday ware</text>
  </g>

  <text x="420" y="495" text-anchor="middle" font-size="11.5" fill="#8a8478">The named clays split across <tspan font-weight="700">both</tspan> ores &#8212; jiani fathers the purples &amp; greens, nenni the reds. * Duanni&#8217;s classification is debated.</text>
</svg>
