<svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tea scum reaction diagram: calcium bicarbonate forms calcium carbonate and CO2, with oxidised polyphenols depositing as iridescent film; lemon drops pH and chelates calcium to dissolve the film">
  <!-- Background -->
  <rect width="820" height="260" fill="#faf8f4"/>

  <!-- Style definitions -->
  <defs>
    <style>
      .title {
        font-family: Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        fill: #2b2b2b;
        text-anchor: middle;
      }
      .equation {
        font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
        font-size: 18px;
        fill: #2b2b2b;
        text-anchor: middle;
      }
      .label {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        fill: #c0492b;
        text-anchor: middle;
      }
      .condition {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        fill: #8a8a8a;
        font-style: italic;
        text-anchor: middle;
      }
      .note {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        fill: #5b8c5a;
        text-anchor: middle;
      }
      .line {
        stroke: #8a8a8a;
        stroke-width: 1;
        fill: none;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="410" y="40" class="title">Why scum forms — and why lemon kills it</text>

  <!-- Condition label -->
  <text x="410" y="76" class="condition">needs BOTH Ca/Mg AND bicarbonate</text>

  <!-- Main chemical equation -->
  <text x="410" y="112" class="equation">Ca²⁺ + 2 HCO₃⁻ ⇌ CaCO₃↓ + CO₂↑ + H₂O</text>

  <!-- Polyphenol addition note -->
  <text x="410" y="139" class="label">+ oxidised polyphenols → iridescent film</text>

  <!-- Separator line -->
  <line x1="100" y1="165" x2="720" y2="165" class="line"/>

  <!-- Lemon annotation -->
  <text x="410" y="195" class="note">lemon → drops pH + chelates Ca²⁺ → no film</text>
</svg>
