<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="820" height="420" fill="#faf8f4"/>

  <!-- Title -->
  <text x="410" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#2b2b2b" text-anchor="middle" font-weight="normal">
    Build your water from a blank canvas
  </text>

  <!-- Left Column: Beaker -->
  <path d="M200,100 L170,310 Q170,330 190,330 L270,330 Q290,330 290,310 L260,100 Z" fill="none" stroke="#3a7ca5" stroke-width="1.5"/>

  <!-- Beaker Label -->
  <text x="230" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#3a7ca5" text-anchor="middle" font-weight="bold">
    RO / distilled
  </text>
  <text x="230" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8a8a8a" text-anchor="middle">
    blank canvas (~0 ppm)
  </text>

  <!-- Arrow from beaker to recipe boxes -->
  <line x1="300" y1="215" x2="345" y2="215" stroke="#8a8a8a" stroke-width="1.5"/>
  <!-- Arrowhead -->
  <polygon points="350,215 340,210 342,220" fill="#8a8a8a"/>

  <!-- Arrow label -->
  <text x="325" y="208" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">
    + minerals
  </text>

  <!-- Recipe Box A (SCA-style) -->
  <rect x="360" y="115" width="410" height="120" rx="6" fill="#ffffff" stroke="#3a7ca5" stroke-width="1.5"/>

  <!-- Box A Title -->
  <text x="565" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#3a7ca5" text-anchor="middle" font-weight="bold">
    SCA-style (coffee-tuned)
  </text>

  <!-- Box A Content -->
  <text x="375" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#2b2b2b">
    per 1 gal (3.78 L): 0.75 g Epsom salt (MgSO₄)
  </text>
  <text x="375" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#2b2b2b">
    + 0.25 g baking soda (NaHCO₃)
  </text>

  <!-- Box A Result Chip -->
  <rect x="565" y="193" width="190" height="24" rx="4" fill="#e7f0f5" stroke="#3a7ca5" stroke-width="1"/>
  <text x="660" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3a7ca5" text-anchor="middle" font-weight="normal">
    ~150 ppm TDS · ~40 ppm alk
  </text>

  <!-- Recipe Box B (No-scale) -->
  <rect x="360" y="255" width="410" height="105" rx="6" fill="#ffffff" stroke="#5b8c5a" stroke-width="1.5"/>

  <!-- Box B Title -->
  <text x="565" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#5b8c5a" text-anchor="middle" font-weight="bold">
    No-scale buffer ('RPavlis')
  </text>

  <!-- Box B Content -->
  <text x="375" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#2b2b2b">
    0.1 g potassium bicarbonate (KHCO₃) per 1 L
  </text>

  <!-- Box B Result Chip -->
  <rect x="540" y="314" width="215" height="24" rx="4" fill="#e8f3e8" stroke="#5b8c5a" stroke-width="1"/>
  <text x="647.5" y="333" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5b8c5a" text-anchor="middle" font-weight="normal">
    buffer only · no limescale
  </text>

  <!-- Footer -->
  <text x="410" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">
    weigh by mass · halve doses for delicate tea
  </text>
</svg>
